services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
  client:
    build: ./client
    command: npm run build && npm start
    depends_on:
      - mosquitto
  consumer:
    build: ./consumer
    command: npm run build && npm start
    depends_on:
      - client